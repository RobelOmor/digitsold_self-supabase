<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>DigitSold - Digital Products Marketplace</title>
    <meta name="title" content="DigitSold - Digital Products Marketplace" />
    <meta name="description" content="DigitSold is a secure digital products marketplace. Buy and sell digital goods with instant delivery, encrypted transactions, and trusted sellers." />
    <meta name="keywords" content="digital products, marketplace, instant delivery, digital goods, secure transactions, online store" />
    <meta name="author" content="DigitSold" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://digitsold.com/" />
    <meta property="og:title" content="DigitSold - Digital Products Marketplace" />
    <meta property="og:description" content="DigitSold is a secure digital products marketplace. Buy and sell digital goods with instant delivery, encrypted transactions, and trusted sellers." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:site_name" content="DigitSold" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://digitsold.com/" />
    <meta name="twitter:title" content="DigitSold - Digital Products Marketplace" />
    <meta name="twitter:description" content="DigitSold is a secure digital products marketplace. Buy and sell digital goods with instant delivery, encrypted transactions, and trusted sellers." />
    <meta name="twitter:image" content="/logo.png" />
    
    <!-- Additional SEO Tags -->
    <link rel="canonical" href="https://digitsold.com/" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="msapplication-TileColor" content="#2563eb" />
    
    <!-- Structured Data / JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "DigitSold",
      "url": "https://digitsold.com/",
      "description": "DigitSold is a secure digital products marketplace. Buy and sell digital goods with instant delivery, encrypted transactions, and trusted sellers.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://digitsold.com/products?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
